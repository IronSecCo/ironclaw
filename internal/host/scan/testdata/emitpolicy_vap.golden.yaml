# Generated by: ironctl scan --emit-policy=vap
# Native ValidatingAdmissionPolicy (Kubernetes 1.30+ GA): enforced by the API
# server itself, with NO admission controller to install. One CEL validation per
# containment control the scanned workload failed (the delta to a 100/A grade).
# Apply with: kubectl apply -f <this-file>
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: ironclaw-containment
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["pods"]
  validations:
    - expression: "object.spec.containers.all(c, (has(c.securityContext) && has(c.securityContext.runAsNonRoot) && c.securityContext.runAsNonRoot == true) || (has(object.spec.securityContext) && has(object.spec.securityContext.runAsNonRoot) && object.spec.securityContext.runAsNonRoot == true))"
      message: "Every container must run as non-root: set securityContext.runAsNonRoot: true at the pod or container level."
      reason: Forbidden
    - expression: "object.spec.containers.all(c, has(c.securityContext) && has(c.securityContext.capabilities) && has(c.securityContext.capabilities.drop) && c.securityContext.capabilities.drop.exists(d, d == 'ALL') && (!has(c.securityContext.privileged) || c.securityContext.privileged != true))"
      message: "Every container must drop ALL Linux capabilities (securityContext.capabilities.drop: [ALL]) and must not run privileged."
      reason: Forbidden
    - expression: "has(object.spec.securityContext) && has(object.spec.securityContext.seccompProfile) && (object.spec.securityContext.seccompProfile.type == 'RuntimeDefault' || object.spec.securityContext.seccompProfile.type == 'Localhost')"
      message: "A seccompProfile of RuntimeDefault or Localhost is required (spec.securityContext.seccompProfile.type)."
      reason: Forbidden
    - expression: "!has(object.spec.hostNetwork) || object.spec.hostNetwork != true"
      message: "hostNetwork is forbidden. NOTE: full egress lockdown (network=none) requires a NetworkPolicy, which admission control cannot express."
      reason: Forbidden
    - expression: "object.spec.containers.all(c, has(c.securityContext) && has(c.securityContext.readOnlyRootFilesystem) && c.securityContext.readOnlyRootFilesystem == true)"
      message: "Every container must use a read-only root filesystem (securityContext.readOnlyRootFilesystem: true)."
      reason: Forbidden
    - expression: "!has(object.spec.volumes) || object.spec.volumes.all(v, !has(v.hostPath) || !(v.hostPath.path in ['/var/run/docker.sock', '/run/docker.sock', '/var/run/containerd/containerd.sock', '/run/containerd/containerd.sock', '/var/run/crio/crio.sock']))"
      message: "Mounting the container runtime socket (docker.sock / containerd.sock / crio.sock) is forbidden: it is a trivial host-root escape."
      reason: Forbidden
    - expression: "(!has(object.spec.hostPID) || object.spec.hostPID != true) && (!has(object.spec.hostIPC) || object.spec.hostIPC != true)"
      message: "Sharing the host PID or IPC namespace is forbidden."
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: ironclaw-containment-binding
spec:
  policyName: ironclaw-containment
  validationActions:
    - Deny
