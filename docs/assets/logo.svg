<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100" role="img" aria-label="IronClaw">
  <title>IronClaw</title>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M50 12 L84 24 L84 52 Q84 78 50 92 Q16 78 16 52 L16 24 Z"/>
    </clipPath>
  </defs>

  <!-- shield -->
  <path d="M50 12 L84 24 L84 52 Q84 78 50 92 Q16 78 16 52 L16 24 Z" fill="url(#steel)"/>
  <path d="M50 12 L84 24 L84 52 Q84 78 50 92 Q16 78 16 52 L16 24 Z" fill="none" stroke="#1e40af" stroke-width="2"/>

  <!-- three claw slashes across the shield -->
  <g clip-path="url(#shieldClip)" stroke="#eaf2ff" stroke-width="5.5" stroke-linecap="round" opacity="0.95">
    <line x1="30" y1="66" x2="62" y2="30"/>
    <line x1="41" y1="71" x2="73" y2="35"/>
    <line x1="52" y1="76" x2="82" y2="43"/>
  </g>

  <!-- wordmark -->
  <text x="104" y="64" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1" fill="url(#word)">IronClaw</text>
</svg>
