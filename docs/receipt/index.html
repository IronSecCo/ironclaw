<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IronClaw containment scan receipt</title>
  <meta name="description" content="A shareable IronClaw containment scan receipt: sandbox isolation grade with a per-dimension breakdown. Scan your own container with ironctl scan.">

  <!-- Social preview. The per-score card is rendered client-side from the URL
       fragment; static hosting cannot vary og:image per share, so the link
       preview uses a generic grade-neutral IronClaw card. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="IronClaw">
  <meta property="og:title" content="IronClaw containment scan receipt">
  <meta property="og:description" content="Sandbox isolation grade + per-dimension breakdown. Scan your own container: ironctl scan &lt;container&gt; --share">
  <meta property="og:image" content="https://ironsecco.github.io/ironclaw/assets/containment-social.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="IronClaw containment scan receipt">
  <meta name="twitter:description" content="Sandbox isolation grade + per-dimension breakdown. Scan your own container with IronClaw.">
  <meta name="twitter:image" content="https://ironsecco.github.io/ironclaw/assets/containment-social.png">

  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --fg: #e6edf3; --muted: #8b949e;
      --a: #3fb950; --b: #9acd32; --c: #d4a72c; --d: #e8873a; --f: #d1242f;
      --grade: var(--muted);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5; padding: 2rem 1rem;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .card-top {
      border-top: 6px solid var(--grade); padding: 1.5rem 1.5rem 1rem;
    }
    .brand { font-size: .8rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 0 0 .25rem; }
    .target { font-size: 1.1rem; margin: 0 0 1rem; word-break: break-all; }
    .target code { background: #0d1117; padding: .15rem .4rem; border-radius: 6px; border: 1px solid var(--border); }
    .score-row { display: flex; align-items: baseline; gap: .75rem; }
    .score { font-size: 3rem; font-weight: 800; line-height: 1; }
    .grade {
      font-size: 1.5rem; font-weight: 800; color: #0d1117;
      background: var(--grade); border-radius: 8px; padding: .1rem .6rem;
    }
    .of100 { color: var(--muted); font-size: 1.1rem; }
    table { width: 100%; border-collapse: collapse; margin: 0; }
    td { padding: .55rem 1.5rem; border-top: 1px solid var(--border); font-size: .95rem; }
    td.v { text-align: right; color: var(--muted); white-space: nowrap; }
    .verdict-pass { color: var(--a); }
    .verdict-warn { color: var(--c); }
    .verdict-fail { color: var(--f); }
    .cta { padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); }
    .cta p { margin: 0 0 .75rem; color: var(--muted); font-size: .9rem; }
    .btns { display: flex; flex-wrap: wrap; gap: .6rem; }
    a.btn {
      display: inline-block; text-decoration: none; font-weight: 600; font-size: .9rem;
      padding: .5rem .9rem; border-radius: 8px; border: 1px solid var(--border);
      color: var(--fg); background: #21262d;
    }
    a.btn.primary { background: var(--a); color: #0d1117; border-color: transparent; }
    pre {
      background: #0d1117; border: 1px solid var(--border); border-radius: 8px;
      padding: .8rem; overflow-x: auto; font-size: .85rem; margin: .75rem 0 0;
    }
    .foot { text-align: center; color: var(--muted); font-size: .8rem; margin-top: 1.25rem; }
    .foot a { color: var(--muted); }
    .empty { padding: 2rem 1.5rem; text-align: center; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="card"></div>
    <p class="foot">
      Generated by <a href="https://github.com/IronSecCo/ironclaw">IronClaw</a>.
      This page renders entirely from the link, no data is sent to any server.
    </p>
  </div>

  <script>
    (function () {
      var HUB = "https://ironsecco.github.io/ironclaw/scan-coverage/";
      var INSTALL = "curl -fsSL https://raw.githubusercontent.com/IronSecCo/ironclaw/main/scripts/install.sh | sh";
      var GRADE_VAR = { A: "--a", B: "--b", C: "--c", D: "--d", F: "--f" };

      function esc(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }
      function verdictClass(v) {
        if (v === "PASS") return "verdict-pass";
        if (v === "WARN") return "verdict-warn";
        return "verdict-fail";
      }
      function verdictGlyph(v) {
        if (v === "PASS") return "✅";
        if (v === "WARN") return "⚠️";
        return "❌";
      }

      var card = document.getElementById("card");
      var frag = (location.hash || "").replace(/^#/, "");
      var p = new URLSearchParams(frag);
      var score = p.get("s"), grade = (p.get("g") || "").toUpperCase();

      if (!score || !grade) {
        card.innerHTML =
          '<div class="empty">' +
          '<p>No scan receipt in this link.</p>' +
          '<p>Generate one with:</p>' +
          '<pre>ironctl scan &lt;container&gt; --share</pre>' +
          '<p style="margin-top:1rem"><a class="btn primary" href="' + HUB + '">Scan your own sandbox</a></p>' +
          '</div>';
        return;
      }

      var target = p.get("t") || "target";
      var version = p.get("v") || "";
      var gradeVar = GRADE_VAR[grade] || "--muted";
      document.documentElement.style.setProperty("--grade", "var(" + gradeVar + ")");

      var rows = "";
      var dims = (p.get("d") || "").split(";").filter(Boolean);
      dims.forEach(function (rec) {
        var f = rec.split("|");
        if (f.length < 4) return;
        var title = f[0], verdict = f[1], s = f[2], max = f[3];
        rows +=
          '<tr><td>' + esc(title) + '</td>' +
          '<td class="v"><span class="' + verdictClass(verdict) + '">' +
          verdictGlyph(verdict) + " " + esc(verdict) + '</span> &nbsp; ' +
          esc(s) + "/" + esc(max) + '</td></tr>';
      });

      var receiptURL = location.href;
      var shareText = encodeURIComponent(
        "My container scored " + score + "/100 (grade " + grade + ") on the IronClaw containment scan."
      );

      card.innerHTML =
        '<div class="card-top">' +
          '<p class="brand">IronClaw containment scan</p>' +
          '<p class="target"><code>' + esc(target) + '</code>' +
            (version ? ' &middot; <span class="of100">' + esc(version) + '</span>' : '') +
          '</p>' +
          '<div class="score-row">' +
            '<span class="score">' + esc(score) + '</span>' +
            '<span class="of100">/ 100</span>' +
            '<span class="grade">' + esc(grade) + '</span>' +
          '</div>' +
        '</div>' +
        '<table><tbody>' + rows + '</tbody></table>' +
        '<div class="cta">' +
          '<p>Scanned with IronClaw, a security-hardened sandbox for AI agents. Grade your own container:</p>' +
          '<div class="btns">' +
            '<a class="btn primary" href="' + HUB + '">Scan your sandbox</a>' +
            '<a class="btn" href="https://twitter.com/intent/tweet?text=' + shareText +
              '&url=' + encodeURIComponent(receiptURL) + '">Share on X</a>' +
            '<a class="btn" href="https://github.com/IronSecCo/ironclaw">Star on GitHub</a>' +
          '</div>' +
          '<pre>' + esc(INSTALL) + '\nironctl scan &lt;container&gt; --share</pre>' +
        '</div>';

      // Grade-color the primary CTA button to match the score.
      var primary = card.querySelector("a.btn.primary");
      if (primary) primary.style.background = "var(" + gradeVar + ")";
    })();
  </script>
</body>
</html>
