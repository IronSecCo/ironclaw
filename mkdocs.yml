site_name: IronClaw
site_description: Security-first, self-hosted AI agents — isolation you can prove, not just claim.
site_url: https://ironsecco.github.io/ironclaw/
repo_url: https://github.com/IronSecCo/ironclaw
repo_name: IronSecCo/ironclaw
edit_uri: edit/main/docs/
copyright: "© IronSec Co. — AGPL-3.0 / commercial dual-licensed"

docs_dir: docs

# The Mintlify scaffold (docs/site/**, docs/docs.json) is a separate hosted-docs
# experiment; it is not part of this MkDocs build.
exclude_docs: |
  site/
  docs.json
  reference/openapi.yaml

# docs/hooks.py copies api/openapi.yaml into the build and stamps the version.
hooks:
  - docs/hooks.py

theme:
  name: material
  language: en
  # Static OG/Twitter social-card meta lives in overrides/main.html (avoids the
  # material[imaging] system-lib dep that per-page social-card generation needs).
  custom_dir: overrides
  # Light-wordmark logo so it reads on the steel-blue / navy header bar.
  logo: assets/logo-light.svg
  # Square curved-claw shield — legible at 16px, unlike the wide wordmark.
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/brand.css
  # Landing-page styles, scoped under `.iro-landing` (home template only).
  - stylesheets/landing.css
  # Interactive provider picker on the model-provider decision page (IRO-311).
  - stylesheets/provider-picker.css

extra_javascript:
  # Render the bare <div class="mermaid"> blocks (see superfences config below).
  # Loaded as an ES module so it can `import` the pinned Mermaid build.
  - path: javascripts/mermaid-init.js
    type: module
  # Provider picker: panel switching + copy buttons (progressive enhancement).
  - javascripts/provider-picker.js

plugins:
  - search
  - render_swagger:
      allow_arbitrary_locations: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      # Render ```mermaid fences as diagrams instead of plain code blocks.
      # GitHub renders the same fences natively, so a diagram authored once
      # shows on both surfaces. We use fence_div_format (emits a bare
      # <div class="mermaid">…), NOT fence_code_format: the latter wraps the
      # source in <pre><code>, and current Mermaid passes that literal <code>
      # tag into the parser ("No diagram type detected for text: <code>…"),
      # leaving an empty box. A bare div is what Mermaid natively expects.
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# The site navigation is assembled at build time from per-directory `.nav.yml`
# fragment files by docs/hooks.py (`_assemble_nav`). There is intentionally no
# `nav:` block here: a single shared nav line is a merge-collision magnet (every
# docs/provider PR edited it). The canonical nav source is docs/.nav.yml, which
# delegates churn-heavy sections to providers/.nav.yml, tutorials/.nav.yml, and
# integrations/.nav.yml. See docs/CONTRIBUTING or the top of docs/hooks.py.
