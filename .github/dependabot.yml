# Dependabot keeps the supply chain current: Go modules, the GitHub Actions used by
# the workflows, and the Docker base images. Everything is pinned to immutable hashes
# (action commit SHAs, image @sha256 digests) for provenance, so Dependabot is what
# bumps those pins as upstream patches land. Weekly to keep PR volume (and Actions
# minutes from the resulting CI runs) bounded.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Both container/Dockerfile and container/controlplane.Dockerfile pin their
  # golang/debian bases to @sha256 digests; this keeps those digests fresh.
  - package-ecosystem: docker
    directory: "/container"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: container
    groups:
      docker-bases:
        patterns: ["*"]
    ignore:
      # Hold the golang base on the 1.23 line so the container toolchain stays
      # aligned with go.mod (go 1.23) and the exact setup-go pin (1.23.12) used by
      # every CI/release build — one toolchain, one reproducible output. Patch
      # digest refreshes within 1.23.x still flow; a move to a newer Go minor is a
      # deliberate, coordinated bump (go.mod + setup-go + reproducibility re-verify),
      # not a container-only drift.
      - dependency-name: "golang"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
