# CodeQL static analysis for Go.
#
# Cost note: this runs on PRs to main and once weekly — deliberately NOT on every
# push — to keep Actions minutes bounded. (The per-push release build in release.yml
# is the heavy consumer; CodeQL is kept light.)
#
# workflow_dispatch lets a maintainer refresh the default-branch analysis on demand
# (e.g. after a fix merges to main) so code-scanning alerts re-evaluate immediately
# instead of waiting for the weekly schedule. Still bounded — manual, not per-push.
name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC
  workflow_dispatch:

# Least privilege at the top level; the analyze job elevates only what it needs.
permissions:
  contents: read

jobs:
  analyze:
    # The job name is the status-check context GitHub reports. The `main` branch
    # ruleset (.github/rulesets/main.json) requires the "CodeQL" check, so this
    # name must stay "CodeQL" — renaming it would break the required-status gate.
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload CodeQL results
    steps:
      # Actions pinned to commit SHAs (tag in trailing comment); Dependabot bumps them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.23.12"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: go

      # IronClaw is CGO (the SQLCipher encrypted-queue binding), so build explicitly
      # with CGO enabled rather than relying on autobuild.
      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:go"
