# CodeQL static analysis for Go.
#
# Cost note: this runs on PRs to main and once weekly — deliberately NOT on every
# push — to keep Actions minutes bounded. (The per-push release build in release.yml
# is the heavy consumer; CodeQL is kept light.)
name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

# Least privilege at the top level; the analyze job elevates only what it needs.
permissions:
  contents: read

jobs:
  analyze:
    # The job name is the status-check context GitHub reports. The `main` branch
    # ruleset (.github/rulesets/main.json) requires the "CodeQL" check, so this
    # name must stay "CodeQL" — renaming it would break the required-status gate.
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload CodeQL results
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      # IronClaw is CGO (the SQLCipher encrypted-queue binding), so build explicitly
      # with CGO enabled rather than relying on autobuild.
      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
