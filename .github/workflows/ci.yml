name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # CGO is required: the encrypted-SQLite binding (SQLite3/SQLCipher) builds via
    # cgo. ubuntu-latest ships gcc; the driver vendors the SQLCipher C amalgamation,
    # so no system libsqlcipher is needed.
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  no-binaries:
    # Reject accidentally-committed build artifacts (see IRO-8: a 17MB
    # controlplane binary was once committed). Guards the repo against bloat.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: reject committed binaries
        run: ./scripts/check-no-binaries.sh
