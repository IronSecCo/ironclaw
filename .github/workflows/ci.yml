name: CI

on:
  push:
  pull_request:

# Least-privilege default for every job in this workflow (Scorecard Token-Permissions).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # CGO is required: the encrypted-SQLite binding (SQLite3/SQLCipher) builds via
    # cgo. ubuntu-latest ships gcc; the driver vendors the SQLCipher C amalgamation,
    # so no system libsqlcipher is needed.
    env:
      CGO_ENABLED: "1"
    steps:
      # Third-party actions are pinned to a commit SHA (with the human-readable tag in
      # a trailing comment) so a moved tag can never change what runs in CI. Dependabot
      # (github-actions ecosystem) bumps these SHAs. See OpenSSF Scorecard Pinned-Dependencies.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          # Exact patch pin (not just "1.23") so every build uses one toolchain — a
          # prerequisite for reproducible builds (IRO-32 A4).
          go-version: "1.23.12"
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  # Short bounded native-fuzz run over the highest-risk untrusted-input parsers
  # (skill manifest YAML, minisign signature/key blobs, name/version/asset path
  # validation). This is a regression smoke test, not an exhaustive campaign: each
  # target runs briefly so the build stays fast while OpenSSF Scorecard's Fuzzing
  # check detects that the repo runs Go native fuzzing. See
  # internal/host/skills/fuzz_test.go.
  fuzz:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.23.12"
      - name: fuzz (short, skills parsing/path surfaces)
        run: |
          for target in FuzzParse FuzzParseSignature FuzzParsePublicKey FuzzValidAssetPath FuzzValidIdentifiers; do
            echo "::group::$target"
            go test ./internal/host/skills/ -run='^$' -fuzz="^${target}$" -fuzztime=30s
            echo "::endgroup::"
          done
