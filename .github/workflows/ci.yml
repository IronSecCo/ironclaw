name: CI

on:
  push:
  pull_request:

# Least-privilege default for every job in this workflow (Scorecard Token-Permissions).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # CGO is required: the encrypted-SQLite binding (SQLite3/SQLCipher) builds via
    # cgo. ubuntu-latest ships gcc; the driver vendors the SQLCipher C amalgamation,
    # so no system libsqlcipher is needed.
    env:
      CGO_ENABLED: "1"
    steps:
      # Third-party actions are pinned to a commit SHA (with the human-readable tag in
      # a trailing comment) so a moved tag can never change what runs in CI. Dependabot
      # (github-actions ecosystem) bumps these SHAs. See OpenSSF Scorecard Pinned-Dependencies.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          # Exact patch pin (not just "1.23") so every build uses one toolchain — a
          # prerequisite for reproducible builds (IRO-32 A4).
          go-version: "1.23.12"
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  # Deterministic concurrency regression gate for the control-plane seq allocators
  # (IRO-278 / IRO-283). Inbound (messages_in) and outbound (messages_out) seqs are
  # minted atomically inside the INSERT; these packages own that invariant. Running
  # their tests under -race on every push/PR means a reintroduced uncoordinated
  # minter — the UNIQUE(seq) collision that broke recurring schedule_task and 500'd
  # /chat/send — fails CI instead of shipping. Scoped to the queue-owning packages
  # so the race build stays fast. -count=1 disables the test cache so the race
  # detector actually re-executes the concurrent writers every run.
  race:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.23.12"
      - name: race (control-plane seq allocators)
        run: |
          go test -race -count=1 \
            ./internal/host/queue/ \
            ./internal/sandbox/queue/ \
            ./internal/host/router/ \
            ./internal/host/sweep/ \
            ./internal/host/delivery/ \
            ./test/parity/

  # Credential-free provider regression guard (IRO-292). We ship model providers
  # fast (Gemini, Vertex, Bedrock, Azure, OpenRouter, ...); this job stops config
  # drift from rotting them. scripts/provider-smoke-guard.sh parses the Kind*
  # constants from internal/sandbox/provider/provider.go (the factory's source of
  # truth) and fails, by name, if any provider kind lacks a credential-free factory
  # test — or, for a dedicated-injector provider (vertex/bedrock/azure/local), a
  # host-injector test — then re-runs those two test packages with EVERY provider
  # credential scrubbed from the env, proving the credential-free path is green with
  # no secrets present. Unlike the umbrella `go test ./...` in `build`, this is a
  # dedicated, visible check: a provider shipped without a credential-free path
  # turns THIS job red with a clear message, instead of silently having no coverage.
  # Mirrors the additive posture of example-smoke.yml (IRO-284).
  provider-smoke:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.23.12"
      - name: provider smoke guard (credential-free factory + injector coverage)
        run: scripts/provider-smoke-guard.sh

  # Short bounded native-fuzz run over the highest-risk untrusted-input parsers
  # (skill manifest YAML, minisign signature/key blobs, name/version/asset path
  # validation). This is a regression smoke test, not an exhaustive campaign: each
  # target runs briefly so the build stays fast while OpenSSF Scorecard's Fuzzing
  # check detects that the repo runs Go native fuzzing. See
  # internal/host/skills/fuzz_test.go.
  fuzz:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.23.12"
      - name: fuzz (short, skills parsing/path surfaces)
        run: |
          for target in FuzzParse FuzzParseSignature FuzzParsePublicKey FuzzValidAssetPath FuzzValidIdentifiers; do
            echo "::group::$target"
            go test ./internal/host/skills/ -run='^$' -fuzz="^${target}$" -fuzztime=30s
            echo "::endgroup::"
          done

  # Guard the published Linux binaries' glibc floor on every PR (IRO-192). The release job
  # builds the linux artifacts inside a pinned glibc-2.31 (Debian 11 "bullseye") container
  # so they run on every mainstream server LTS (Ubuntu 22.04 = 2.35, Debian 12 = 2.36,
  # RHEL 9 = 2.34). release.yml only runs on push to main, so this job is the pre-merge
  # proof: it rebuilds the same way and fails if any binary requires a newer glibc than 2.31.
  # It mirrors release.yml's build env exactly (same container digest, setup-go, GOMAXPROCS),
  # so it also catches a setup-go / toolchain regression inside the container before a tag.
  glibc-floor:
    runs-on: ubuntu-latest
    container: "golang:1.23.12-bullseye@sha256:161b8513c09cbfa4c174fd32e46eddc5eddf487a43958b9cf8b07d628e9e0f85"
    env:
      CGO_ENABLED: "1"
      GOMAXPROCS: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.23.12"
          cache: false
      - name: Build linux/amd64 in the release container and assert glibc <= 2.31
        shell: bash
        run: |
          set -euo pipefail
          go mod download all
          mkdir -p dist/pkg
          ldflags="-s -w -buildid= -extldflags=-Wl,--build-id=none"
          for cmd in controlplane ironctl sandbox; do
            out="ironctl"
            case "$cmd" in
              controlplane) out="ironclaw-controlplane" ;;
              sandbox)      out="ironclaw-sandbox" ;;
            esac
            # -buildvcs=false: this runs in a container as root over a workspace owned by a
            # different uid, so git's "dubious ownership" guard would abort VCS stamping
            # ("error obtaining VCS status"). Matches release.yml's linux build (IRO-192).
            CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
              go build -trimpath -buildvcs=false -ldflags "${ldflags}" -o "dist/pkg/${out}" "./cmd/${cmd}"
          done
          floor="2.31"
          fail=0
          for bin in dist/pkg/ironctl dist/pkg/ironclaw-controlplane dist/pkg/ironclaw-sandbox; do
            max=$(objdump -T "$bin" 2>/dev/null | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -1)
            : "${max:=none}"
            if [ "$max" = "none" ]; then
              echo "==> $bin: no versioned GLIBC symbols — OK"
              continue
            fi
            if [ "$(printf '%s\n%s\n' "$max" "$floor" | sort -V | tail -1)" != "$floor" ]; then
              echo "::error title=glibc floor::$bin requires GLIBC_${max} > ${floor} — would not run on Ubuntu 22.04 / Debian 12 / RHEL 9 (IRO-192)." >&2
              fail=1
            else
              echo "==> $bin: max GLIBC_${max} <= ${floor} — OK"
            fi
          done
          [ "$fail" -eq 0 ]
