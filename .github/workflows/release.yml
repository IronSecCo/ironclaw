name: Release

# Cut a release on every push to main: derive a version, build the binaries for
# every supported platform, and publish a GitHub Release with checksummed archives
# that scripts/install.sh can curl down.
#
# CGO is mandatory (the encrypted-SQLite binding compiles the vendored SQLCipher C
# amalgamation), so each target is built on a runner with a matching C toolchain
# rather than cross-compiled blind. The only cross-build is linux/arm64, which is
# pure C and links cleanly with the aarch64 GNU cross-compiler.

on:
  push:
    branches: [main]
    # The `formula` job below opens a PR that only touches Formula/ironclaw.rb to
    # track each release. Merging that PR must NOT cut another release (which would
    # regenerate the formula again, looping forever), so a commit that touches only
    # the formula is ignored here. The version is still commit-count derived, so a
    # skipped formula-only commit just means the next real release skips a number.
    paths-ignore:
      - "Formula/ironclaw.rb"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to cut (e.g. v0.1.99). Blank = auto-derive vBASE.<commit-count>."
        required: false
        default: ""

# Serialize releases. Never cancel a half-finished one — that could orphan a tag.
concurrency:
  group: release
  cancel-in-progress: false

# Least privilege by default: the workflow token is read-only at the top level.
# The only job that needs to write (create the Release + tag, upload assets) grants
# `contents: write` to itself; every other job inherits read-only.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version/tag once, so the matrix and the release agree on it.
  # Version = vBASE_VERSION.<total commit count>: monotonic, no manual bumps, and
  # tied to a specific commit. Bump BASE_VERSION below to roll major/minor.
  # ---------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read # only reads git history to derive the tag
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      exists: ${{ steps.v.outputs.exists }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: v
        env:
          BASE_VERSION: "0.1"
          OVERRIDE: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE}" ]; then
            tag="${OVERRIDE}"
          else
            tag="v${BASE_VERSION}.$(git rev-list --count HEAD)"
          fi
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            exists=true
          else
            exists=false
          fi
          {
            echo "tag=${tag}"
            echo "version=${tag#v}"
            echo "exists=${exists}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ${tag} (already tagged: ${exists})"

  # ---------------------------------------------------------------------------
  # Build one checksummed archive per platform on a runner with a native (or, for
  # linux/arm64, a cross) C toolchain.
  # ---------------------------------------------------------------------------
  build:
    needs: version
    if: needs.version.outputs.exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel — cross-compiled on Apple Silicon. GitHub's Intel-hosted
          # runners (macos-13) are scarce and deprecated; the macOS SDK is universal,
          # so the vendored SQLCipher C amalgamation builds for x86_64 right here via
          # CGO_*FLAGS=-arch x86_64 (verified to produce a valid x86_64 Mach-O).
          - { goos: darwin, goarch: amd64, runner: macos-14, name: darwin_amd64, cgoarch: x86_64 }
          # macOS Apple Silicon — native clang.
          - { goos: darwin, goarch: arm64, runner: macos-14, name: darwin_arm64 }
          # Linux x86_64 — native gcc, inside a pinned glibc-2.31 (Debian 11 "bullseye")
          # container. GitHub's hosted ubuntu-latest now ships glibc 2.39, which makes the
          # linker version every symbol up to GLIBC_2.38 — so the published binary refuses
          # to start on every mainstream server LTS (Ubuntu 22.04 = 2.35, Debian 12 = 2.36,
          # RHEL 9 = 2.34). Building in bullseye floors the requirement at GLIBC_2.31, which
          # every distro from Ubuntu 20.04 / Debian 11 / RHEL 9 onward satisfies. The digest
          # pin makes the build glibc a deterministic, reproducible input (IRO-192).
          - { goos: linux, goarch: amd64, runner: ubuntu-latest, name: linux_amd64, container: "golang:1.23.12-bullseye@sha256:161b8513c09cbfa4c174fd32e46eddc5eddf487a43958b9cf8b07d628e9e0f85" }
          # Linux arm64 — cross-compiled with the aarch64 GNU toolchain, in the same
          # bullseye container so the arm64 binary floors at the same GLIBC_2.31.
          - { goos: linux, goarch: arm64, runner: ubuntu-latest, name: linux_arm64, cc: aarch64-linux-gnu-gcc, apt: gcc-aarch64-linux-gnu, container: "golang:1.23.12-bullseye@sha256:161b8513c09cbfa4c174fd32e46eddc5eddf487a43958b9cf8b07d628e9e0f85" }
          # Windows x86_64 — native mingw-w64 gcc (preinstalled on the runner).
          - { goos: windows, goarch: amd64, runner: windows-latest, name: windows_amd64 }
    runs-on: ${{ matrix.runner }}
    # Only the linux legs set matrix.container; for macOS/Windows it is undefined, which
    # evaluates to an empty string here and runs the job directly on the host runner.
    container: ${{ matrix.container }}
    permissions:
      contents: read # checkout
      id-token: write # OIDC token for keyless provenance signing (Sigstore)
      attestations: write # actions/attest-build-provenance over the raw binaries
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.23.12"
          # No build-cache restore: a cached archive can carry a symbol order frozen from
          # an earlier parallel build, which would make the published binary diverge from
          # an independent reproducible rebuild (IRO-44). Build cold every time.
          cache: false

      - name: Install cross C toolchain
        if: matrix.apt != ''
        # Runs inside the bullseye container (the linux/arm64 leg sets matrix.apt),
        # whose default shell is sh (dash) — and dash rejects `set -o pipefail`. The
        # sibling run-steps already pin bash; this one was missed in #211, which reds
        # every Release run on the linux/arm64 leg. Pin bash so pipefail is valid. (IRO-201)
        shell: bash
        env:
          APT_PKG: ${{ matrix.apt }}
        run: |
          set -euo pipefail
          # Inside the bullseye container we run as root with no sudo binary; on a bare
          # runner we are an unprivileged user and need sudo. Pick whichever applies.
          if command -v sudo >/dev/null 2>&1; then SUDO="sudo"; else SUDO=""; fi
          ${SUDO} apt-get update
          ${SUDO} apt-get install -y "${APT_PKG}"

      - name: Build binaries
        shell: bash
        env:
          CGO_ENABLED: "1"
          # Single-threaded build so the published artifacts are bit-for-bit reproducible:
          # the Go compiler/linker otherwise resolve ties in symbol ordering (generic
          # [go.shape...] instantiations, ..stmp_ statics) in the scheduling order of their
          # GOMAXPROCS-many goroutines, so on a multi-core runner two cold builds of the
          # same commit differ (it bit the control-plane binary). This is the canonical
          # reproducible build that reproducibility.yml asserts. (IRO-44)
          GOMAXPROCS: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC_OVERRIDE: ${{ matrix.cc }}
          CGO_ARCH: ${{ matrix.cgoarch }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          # Pre-fetch modules so the build doesn't race a module download/extract on its
          # first (and only) run — the other half of the IRO-44 reproducibility fix
          # (otherwise a fresh-runner build diverges from a warmed independent rebuild).
          go mod download all
          # Linux arm64 uses a GNU cross-gcc (matrix.cc); macOS Intel cross-compiles
          # with clang via -arch on the universal SDK (matrix.cgoarch).
          [ -n "${CC_OVERRIDE}" ] && export CC="${CC_OVERRIDE}"
          [ -n "${CGO_ARCH}" ] && { export CGO_CFLAGS="-arch ${CGO_ARCH}"; export CGO_LDFLAGS="-arch ${CGO_ARCH}"; }
          ext=""
          [ "${GOOS}" = "windows" ] && ext=".exe"
          # -buildid= empties Go's content-hash build ID (varies across cold rebuilds)
          # and is safe on every platform. The GNU .note.gnu.build-id is only emitted by
          # GNU ld, so --build-id=none is gated to Linux — passing it to macOS's ld64
          # would break the darwin targets. Together these make the Linux artifacts
          # bit-for-bit reproducible (the platform reproducibility.yml verifies).
          ldflags="-s -w -buildid= -X github.com/IronSecCo/ironclaw/internal/version.Version=${TAG}"
          [ "${GOOS}" = "linux" ] && ldflags="${ldflags} -extldflags=-Wl,--build-id=none"
          # The linux legs build inside a container as root over a workspace owned by a
          # different uid, so git refuses with "dubious ownership" and `go build`'s VCS
          # stamping aborts ("error obtaining VCS status: exit status 128"). Disable VCS
          # stamping on linux — the binary's provenance is recorded cryptographically by the
          # build-provenance attestation below (stronger than Go's embedded git stamp), and
          # the version string is already injected via -ldflags -X. (IRO-192)
          vcs=""
          [ "${GOOS}" = "linux" ] && vcs="-buildvcs=false"
          mkdir -p dist/pkg
          for cmd in controlplane ironctl sandbox; do
            out="ironctl"
            case "$cmd" in
              controlplane) out="ironclaw-controlplane" ;;
              sandbox)      out="ironclaw-sandbox" ;;
            esac
            echo "==> building ${out}${ext} (${GOOS}/${GOARCH})"
            go build -trimpath ${vcs} -ldflags "${ldflags}" -o "dist/pkg/${out}${ext}" "./cmd/${cmd}"
          done
          cp LICENSE README.md dist/pkg/

      # Fail the release if a linux binary regresses past the glibc-2.31 floor. This is the
      # exact failure mode IRO-192 fixed: a build env with a newer glibc silently versions
      # symbols up, and the binary won't start on mainstream server LTS distros (Ubuntu
      # 22.04 = 2.35, Debian 12 = 2.36, RHEL 9 = 2.34). objdump -T lists the versioned libc
      # symbols the binary requires; we assert the highest is <= GLIBC_2.31. (ci.yml runs the
      # same assertion on every PR so a regression is caught before it ever reaches a tag.)
      - name: Assert Linux glibc floor (<= 2.31)
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          floor="2.31"
          fail=0
          for bin in dist/pkg/ironctl dist/pkg/ironclaw-controlplane dist/pkg/ironclaw-sandbox; do
            max=$(objdump -T "$bin" 2>/dev/null | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -1)
            : "${max:=none}"
            if [ "$max" = "none" ]; then
              echo "==> $bin: no versioned GLIBC symbols (static/none) — OK"
              continue
            fi
            if [ "$(printf '%s\n%s\n' "$max" "$floor" | sort -V | tail -1)" != "$floor" ]; then
              echo "::error title=glibc floor::$bin requires GLIBC_${max} > ${floor} — would not run on Ubuntu 22.04 / Debian 12 / RHEL 9. Build env glibc regressed (IRO-192)." >&2
              fail=1
            else
              echo "==> $bin: max GLIBC_${max} <= ${floor} — OK"
            fi
          done
          [ "$fail" -eq 0 ]

      # Attest build provenance for the RAW binaries (ironctl, ironclaw-controlplane,
      # ironclaw-sandbox), not just the archive. The archive attestation in the release
      # job is keyed on the .tar.gz/.zip digest; a user who extracts the tarball and runs
      # `gh attestation verify ./ironctl` is checking the *binary* digest, which has no
      # attestation unless we publish one here — that was the IRO-46 404. Attesting per
      # build leg is where the binaries exist (the release job only ever sees archives).
      # The `dist/pkg/iron*` glob matches the three binaries (and their .exe variants on
      # Windows) while excluding the copied-in LICENSE / README.md.
      - name: Attest build provenance for the binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: "dist/pkg/iron*"

      - name: Package archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          VERSION: ${{ needs.version.outputs.version }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          base="ironclaw_${VERSION}_${MATRIX_NAME}"
          mkdir -p dist/out
          if [ "${GOOS}" = "windows" ]; then
            ( cd dist/pkg && 7z a -tzip "../out/${base}.zip" ./* >/dev/null )
          else
            tar -czf "dist/out/${base}.tar.gz" -C dist/pkg .
          fi
          ls -l dist/out

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.name }}
          path: dist/out/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Collect every archive, write SHA256SUMS, and publish the release + tag at the
  # exact commit that triggered the run. Runs only if all builds succeeded, so a
  # release is never partial.
  # ---------------------------------------------------------------------------
  release:
    needs: [version, build]
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
      id-token: write # keyless cosign + provenance signing (Sigstore OIDC)
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          ( cd dist && sha256sum ./* > SHA256SUMS )
          echo "Release assets:"
          cat dist/SHA256SUMS

      - name: Write release notes
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          cat > notes.md <<EOF
          Automated release for commit \`${GITHUB_SHA}\`.

          ### Install (macOS / Linux)

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.sh | sh
          \`\`\`

          ### Install (Windows, PowerShell)

          \`\`\`powershell
          irm https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.ps1 | iex
          \`\`\`

          To pin this version, set \`IRONCLAW_VERSION=${TAG}\` before running the installer.

          Archives are attached below; verify them against \`SHA256SUMS\`.
          EOF

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" dist/* \
            --title "${TAG}" \
            --notes-file notes.md \
            --target "${GITHUB_SHA}" \
            --latest
          echo "Released ${TAG} → ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

      # Everything below runs AFTER publish so a tooling/Sigstore hiccup can never block
      # a release — the binaries + checksums are already out; SBOMs and the signature
      # are uploaded to the existing release.
      # Pin syft via the SHA-pinned download-syft sub-action instead of
      # `curl …/syft/main/install.sh | sh` (mutable branch piped to a shell).
      # The sub-action installs a fixed syft onto PATH; the scan command is unchanged.
      # This is the trust-critical SBOM/attestation path — keep it pinned & auditable.
      - name: Install syft (pinned)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Generate SBOMs (syft → SPDX + CycloneDX) and attach them
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          syft version
          syft scan dir:. \
            -o "spdx-json=ironclaw_${VERSION}.spdx.json" \
            -o "cyclonedx-json=ironclaw_${VERSION}.cdx.json"
          gh release upload "${TAG}" "ironclaw_${VERSION}.spdx.json" "ironclaw_${VERSION}.cdx.json" --clobber

      # Pin cosign to the 2.x line. cosign 3.x flips `sign-blob` to the new Sigstore
      # bundle format by default, makes `--bundle` required, and deprecates/ignores
      # `--output-signature`/`--output-certificate` — which broke this step (it tried
      # to write a bundle to an empty path → "create bundle file: open :"). 2.6.3 keeps
      # the detached `.sig`/`.pem` output that the verify smoke step, README "Verify the
      # download", docs/security.md, and the release runbook all rely on. Pinning also
      # makes the signing tool a deterministic, reproducible dependency. See IRO-195.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      - name: Sign the checksum file (cosign keyless) and attach it
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          cosign sign-blob --yes dist/SHA256SUMS \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem
          gh release upload "${TAG}" dist/SHA256SUMS.sig dist/SHA256SUMS.pem --clobber
          echo "Signed SHA256SUMS keylessly (cert + signature attached to the release)."

      - name: Attest build provenance for the release binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: "dist/*.tar.gz, dist/*.zip"

  # ---------------------------------------------------------------------------
  # Post-release smoke test. Install the release we just cut through the real,
  # checksum-verifying scripts/install.sh — the normal user path, NOT --dev — and
  # assert `ironctl version` reports the exact tag. This proves the published
  # artifacts download, pass SHA256SUMS verification, install, and run on every
  # install.sh target before we trust the release.
  #
  # Fail-closed: a failure here turns the whole Release run red. image.yml chains
  # off this workflow's success (workflow_run + conclusion == 'success'), so a
  # smoke failure also blocks the GHCR image. The release assets are already
  # published by this point — a red smoke run is the signal to yank the release
  # (see the release runbook). Prefer a yanked/failed release over a green lie.
  #
  # Each target runs the binary NATIVELY so cross-built archives (linux/arm64 via
  # the aarch64 cross-gcc, darwin/amd64 via -arch on the universal SDK) are proven
  # to actually execute, not just compile. (Windows is the PowerShell install.ps1
  # path — covered by the sibling smoke_windows job below, not this matrix.)
  # ---------------------------------------------------------------------------
  smoke:
    needs: [version, release]
    if: needs.version.outputs.exists == 'false'
    permissions:
      contents: read # read the just-published release assets through install.sh
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, name: linux_amd64 }
          - { runner: ubuntu-24.04-arm, name: linux_arm64 }
          - { runner: macos-14, name: darwin_arm64 }
          - { runner: macos-15-intel, name: darwin_amd64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pin to the same 2.x cosign the release job signed with, so verify-blob
      # consumes the detached `.sig`/`.pem` it produced. See IRO-195.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      # Verify the keyless cosign signature over SHA256SUMS the way a real user does:
      # anonymously, from the published release, with no key to manage — the trusted
      # identity is the Release workflow's own OIDC cert. This proves A1 end-to-end
      # (sign on publish → verify on consume) before we trust the release. Runs BEFORE
      # the installer so a forged/missing signature fails the release, not just a bad
      # checksum. (Windows is covered by the install.ps1 smoke job; cosign verify here
      # exercises the Linux/macOS matrix.)
      - name: Verify cosign signature over SHA256SUMS (anonymous)
        shell: bash
        env:
          TAG: ${{ needs.version.outputs.tag }}
          MATRIX_NAME: ${{ matrix.name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          work="${RUNNER_TEMP}/cosign-verify"
          mkdir -p "${work}"
          # Pull exactly the three signing artifacts the Release job attached.
          gh release download "${TAG}" --repo "${REPO}" --dir "${work}" --clobber \
            -p SHA256SUMS -p SHA256SUMS.sig -p SHA256SUMS.pem
          # The cert identity is this repo's Release workflow; the issuer is GitHub's
          # OIDC provider. A signature from any other identity/issuer is rejected.
          if ! cosign verify-blob "${work}/SHA256SUMS" \
              --signature "${work}/SHA256SUMS.sig" \
              --certificate "${work}/SHA256SUMS.pem" \
              --certificate-identity-regexp "^https://github.com/${REPO}/" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com; then
            echo "::error title=Smoke (${MATRIX_NAME})::cosign could not verify the SHA256SUMS signature for ${TAG} against the Release workflow identity. The release signature is missing or untrusted — yank it (see the release runbook)." >&2
            exit 1
          fi
          echo "cosign OK on ${MATRIX_NAME}: SHA256SUMS signed by ${REPO} Release workflow (keyless)."

      - name: Install via scripts/install.sh and verify ironctl version
        shell: bash
        env:
          TAG: ${{ needs.version.outputs.tag }}
          MATRIX_NAME: ${{ matrix.name }}
          # Pin to the exact tag and point install.sh at this repo. GITHUB_TOKEN lets
          # the installer resolve assets even while the repo is private (raised API
          # limit + octet-stream asset download).
          IRONCLAW_VERSION: ${{ needs.version.outputs.tag }}
          IRONCLAW_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bindir="${RUNNER_TEMP}/ironclaw-bin"

          # Run the real installer (checksum-verifying path). Capture output so we can
          # assert it actually verified SHA256SUMS rather than silently skipping.
          out="$(IRONCLAW_BINDIR="${bindir}" sh scripts/install.sh 2>&1)"
          printf '%s\n' "${out}"

          if ! printf '%s\n' "${out}" | grep -q 'Checksum OK'; then
            echo "::error title=Smoke (${MATRIX_NAME})::install.sh did not verify SHA256SUMS — the checksum-verifying install path was not exercised. Refusing to call this release verified." >&2
            exit 1
          fi

          got="$("${bindir}/ironctl" version)"
          want="ironctl ${TAG}"
          echo "ironctl version → ${got} (want: ${want})"
          if [ "${got}" != "${want}" ]; then
            echo "::error title=Smoke (${MATRIX_NAME})::version mismatch: ironctl reported '${got}', expected '${want}'. The published release ${TAG} is bad — yank it (see the release runbook)." >&2
            exit 1
          fi

          echo "Smoke OK on ${MATRIX_NAME}: ${TAG} installs via install.sh (checksum-verified) and runs."

  # ---------------------------------------------------------------------------
  # Windows post-release smoke test — the install.ps1 mirror of `smoke` above.
  # Installs the release we just cut through the real, checksum-verifying
  # scripts/install.ps1 (the normal `irm | iex` user path, NOT a dev/local copy)
  # and asserts `ironctl version` reports the exact tag. This proves the published
  # windows_amd64 archive downloads, passes SHA256SUMS verification, installs, and
  # runs before we trust the release on Windows.
  #
  # Same fail-closed contract as `smoke`: a failure here turns the whole Release
  # run red, and image.yml chains off this workflow's success (workflow_run +
  # conclusion == 'success'), so a Windows smoke failure also blocks the GHCR
  # image. The assets are already published by now — a red run is the signal to
  # yank the release (see the release runbook), never a green lie.
  #
  # Scope: windows_amd64 only. The build matrix publishes a single Windows archive
  # (windows_amd64) and install.ps1 resolves only that target, so there is no
  # windows_arm64 asset to install — a windows-11-arm leg would have nothing to
  # verify. Add one here only once the matrix ships a native windows_arm64 archive
  # and install.ps1 learns to select it.
  # ---------------------------------------------------------------------------
  smoke_windows:
    needs: [version, release]
    if: needs.version.outputs.exists == 'false'
    permissions:
      contents: read # read the just-published release assets through install.ps1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install via scripts/install.ps1 and verify ironctl version
        shell: pwsh
        env:
          TAG: ${{ needs.version.outputs.tag }}
          MATRIX_NAME: windows_amd64
          # Pin to the exact tag and point install.ps1 at this repo. GITHUB_TOKEN lets
          # the installer resolve assets even while the repo is private (raised API
          # limit + octet-stream asset download).
          IRONCLAW_VERSION: ${{ needs.version.outputs.tag }}
          IRONCLAW_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $bindir = Join-Path $env:RUNNER_TEMP 'ironclaw-bin'
          $env:IRONCLAW_BINDIR = $bindir

          # Run the real installer (checksum-verifying path). Merge every stream
          # (Write-Host is the Information stream) into one string so we can both
          # echo it and assert it actually verified SHA256SUMS. A throw inside the
          # script (ErrorActionPreference=Stop) reds the step — fail-closed.
          $out = ''
          try {
            $out = & (Join-Path $PWD 'scripts/install.ps1') *>&1 | Out-String
          } catch {
            Write-Host $out
            Write-Host "::error title=Smoke ($env:MATRIX_NAME)::install.ps1 failed: $($_.Exception.Message). The published release $env:TAG could not be installed on Windows — yank it (see the release runbook)."
            exit 1
          }
          Write-Host $out

          if ($out -notmatch 'Checksum OK') {
            Write-Host "::error title=Smoke ($env:MATRIX_NAME)::install.ps1 did not verify SHA256SUMS — the checksum-verifying install path was not exercised. Refusing to call this release verified."
            exit 1
          }

          $exe = Join-Path $bindir 'ironctl.exe'
          if (-not (Test-Path $exe)) {
            Write-Host "::error title=Smoke ($env:MATRIX_NAME)::install.ps1 reported success but $exe is missing. The windows_amd64 archive did not install ironctl.exe."
            exit 1
          }

          $got = (& $exe version | Out-String).Trim()
          $want = "ironctl $env:TAG"
          Write-Host "ironctl version -> $got (want: $want)"
          if ($got -ne $want) {
            Write-Host "::error title=Smoke ($env:MATRIX_NAME)::version mismatch: ironctl reported '$got', expected '$want'. The published release $env:TAG is bad — yank it (see the release runbook)."
            exit 1
          }

          Write-Host "Smoke OK on $env:MATRIX_NAME`: $env:TAG installs via install.ps1 (checksum-verified) and runs."

  # ---------------------------------------------------------------------------
  # Keep the Homebrew tap formula (Formula/ironclaw.rb) tracking the release we
  # just cut, so `brew install ironsecco/ironclaw/ironclaw` never ships a stale
  # binary (the formula used to lag the latest release by ten versions — IRO-193).
  #
  # The formula pins each platform archive to the SHA-256 recorded in the release's
  # signed SHA256SUMS, so it can only be regenerated AFTER the release is published
  # and verified — hence `needs: [version, release, smoke, smoke_windows]`. A
  # release that fails its smoke tests never gets a tracking PR.
  #
  # It does NOT push to main directly: main requires a reviewed PR, passing checks,
  # and signed commits (.github/rulesets/main.json), and weakening that is off the
  # table for a security product. Instead it opens a PR whose single commit is
  # created through the GitHub Contents API — which signs the commit with GitHub's
  # key, satisfying required_signatures — for a maintainer to merge. The push
  # trigger ignores Formula/ironclaw.rb so merging that PR never loops back into
  # another release.
  # ---------------------------------------------------------------------------
  formula:
    needs: [version, release, smoke, smoke_windows]
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the formula-update branch + its signed commit
      pull-requests: write # open the tracking PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Mint a short-lived ironclaw-reviewer[bot] App token scoped to ONLY
      # pull-requests:write, used solely to open the formula-bump PR (IRO-203
      # Option B). The default GITHUB_TOKEN cannot create PRs while the repo
      # "Allow GitHub Actions to create and approve pull requests" setting stays
      # OFF — and we keep it off on purpose: that toggle bundles create + APPROVE,
      # which would let any workflow's token satisfy our `main` required-review
      # ruleset (a control we ship as a product feature). A scoped App token with
      # no approval rights preserves least-privilege.
      #
      # continue-on-error (not an `if:` on secrets — the `secrets` context is not
      # available in a step `if`): when REVIEWER_APP_* aren't provisioned the action
      # fails, the job continues, the token output is empty, and gh pr create below
      # falls back to GITHUB_TOKEN so the IRO-202 loud-fail path still fires instead
      # of this step erroring the whole job.
      - name: Mint reviewer-App token for the formula PR
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}
          permission-pull-requests: write # PR-create only; no contents/approval scope

      - name: Regenerate the formula from the published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          # Reads the release's SHA256SUMS (the trust anchor) and rewrites
          # Formula/ironclaw.rb in place. Pinned to the exact tag we just cut.
          scripts/update-homebrew-formula.sh "${TAG}"

      - name: Open a PR if the formula changed
        env:
          # GH_TOKEN (default) creates the branch + signs the commit via the
          # Contents API — it has contents:write; the scoped App token does not.
          GH_TOKEN: ${{ github.token }}
          # PR_TOKEN opens the PR: the scoped reviewer-App token when provisioned,
          # else the default token (which fails loud per IRO-202 when the repo
          # PR-create setting is off).
          PR_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/ironclaw.rb; then
            echo "Formula already tracks ${TAG} — nothing to open."
            exit 0
          fi

          branch="brew/track-${TAG}"
          base_sha="$(git rev-parse HEAD)"
          # Blob OID of the formula already on main == the Contents API `sha` we must
          # pass to replace it. Git's blob hash and GitHub's content sha are the same.
          file_sha="$(git rev-parse "HEAD:Formula/ironclaw.rb")"
          content_b64="$(base64 -w0 < Formula/ironclaw.rb)"

          # Idempotent: drop a leftover branch from a re-run, then recreate it at the
          # current main tip.
          gh api -X DELETE "repos/${REPO}/git/refs/heads/${branch}" 2>/dev/null || true
          gh api -X POST "repos/${REPO}/git/refs" \
            -f "ref=refs/heads/${branch}" \
            -f "sha=${base_sha}"

          # Commit the regenerated formula onto that branch via the Contents API so
          # the commit is signed by GitHub (required_signatures on main).
          gh api -X PUT "repos/${REPO}/contents/Formula/ironclaw.rb" \
            -f "message=chore(brew): track ${TAG} in the Homebrew formula" \
            -f "content=${content_b64}" \
            -f "sha=${file_sha}" \
            -f "branch=${branch}"

          # Open the tracking PR with the scoped reviewer-App token (PR_TOKEN). The
          # signed branch above is already pushed; the only thing left is the PR.
          # When the App secrets are absent, PR_TOKEN falls back to the default
          # GITHUB_TOKEN, which can only open PRs if the repo setting "Allow GitHub
          # Actions to create and approve pull requests" is enabled — and we keep
          # that OFF on purpose (it would also let any token APPROVE PRs). So the
          # fallback fails with "GitHub Actions is not permitted to create or approve
          # pull requests". Do NOT swallow that: a silently-skipped PR strands
          # `brew install` on a stale release (it pinned v0.1.90 across
          # v0.1.94/95/96 before IRO-202 caught it). Fail LOUD and leave a one-click
          # manual fallback in the job summary, but treat an already-open PR as success.
          body="Automated by the Release workflow: regenerates \`Formula/ironclaw.rb\` from the signed \`SHA256SUMS\` of \`${TAG}\` so \`brew install ironsecco/ironclaw/ironclaw\` tracks the latest release. Merge to publish; the push trigger ignores this file so the merge does not cut another release."
          if out="$(GH_TOKEN="${PR_TOKEN}" gh pr create \
            --repo "${REPO}" \
            --base main \
            --head "${branch}" \
            --title "chore(brew): track ${TAG} in the Homebrew formula" \
            --body "${body}" 2>&1)"; then
            echo "Opened tracking PR: ${out}"
          elif printf '%s' "$out" | grep -qi 'already exists'; then
            echo "A tracking PR for ${TAG} already exists — left it in place."
          else
            echo "::error title=Homebrew formula bump PR not opened::gh pr create failed for ${branch}: ${out}"
            {
              echo "### ⚠️ Homebrew formula bump for \`${TAG}\` needs a manual PR"
              echo
              echo "The GitHub-signed branch [\`${branch}\`](https://github.com/${REPO}/tree/${branch}) was pushed, but the workflow could not open its PR:"
              echo
              echo '```'
              printf '%s\n' "$out"
              echo '```'
              echo
              echo "Usual cause: the **\`REVIEWER_APP_ID\` / \`REVIEWER_APP_PRIVATE_KEY\`** repo secrets are not provisioned, so the formula PR fell back to \`GITHUB_TOKEN\` (which cannot create PRs — the repo PR-create setting is intentionally OFF). Provision the reviewer-App secrets so future releases self-bump (IRO-203 Option B), or open the PR manually from the already-signed branch:"
              echo
              echo '```'
              echo "gh pr create --repo ${REPO} --base main --head ${branch} \\"
              echo "  --title 'chore(brew): track ${TAG} in the Homebrew formula'"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
