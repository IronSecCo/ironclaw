name: Example smoke (zero-cred chat)

# Hermetic, user-facing smoke test of the zero-credential demo path: it runs the
# exact command a first-timer runs — examples/hello-ironclaw/run.sh — which builds
# the sandbox image, brings up docker-compose.demo.yml, sends a chat through the
# real HTTP route into a per-session Docker sandbox, and asserts the offline
# mock-agent's reply comes back. The offline `mock` provider makes no network call,
# so no credential is needed; ubuntu-latest ships Docker, jq, and curl.
#
# This complements the Go-level hermetic test (internal/smoke/demo_smoke_test.go,
# run by CI's `go test`): that guards the queue<->loop<->mock contract; this guards
# the published user path (compose file, demo entrypoint seeding, HTTP routes, the
# Docker/runc sandbox runtime) that the unit test cannot reach.
#
# Additive and non-gating: it is NOT a required status check, so it can never block
# a release — it surfaces a broken first-five-minutes before it reaches a user.

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "docker-compose.demo.yml"
      - "container/**"
      - "cmd/sandbox/**"
      - "cmd/controlplane/**"
      - "internal/host/api/ui_chat.go"
      - "internal/host/isolation/**"
      - ".github/workflows/example-smoke.yml"
  pull_request:
    paths:
      - "examples/**"
      - "docker-compose.demo.yml"
      - "container/**"
      - "cmd/sandbox/**"
      - "cmd/controlplane/**"
      - "internal/host/api/ui_chat.go"
      - "internal/host/isolation/**"
      - ".github/workflows/example-smoke.yml"
  workflow_dispatch:

# Least-privilege default (Scorecard Token-Permissions): the job only reads the repo.
permissions:
  contents: read

jobs:
  hello-ironclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Pinned to a commit SHA (tag in trailing comment) so a moved tag cannot change
      # what runs in CI — matches ci.yml. Dependabot bumps these.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run the zero-credential end-to-end check
        # The script builds ironclaw-sandbox:latest, brings the demo control-plane up,
        # asserts the round-trip reply, and tears the demo down. A missing/mismatched
        # reply exits non-zero and dumps the control-plane logs.
        run: examples/hello-ironclaw/run.sh

  red-team-escape:
    # The adversarial counterpart: engage a real sandbox, attack it from the inside
    # (assuming a fully-compromised agent), and assert the isolation boundary holds.
    # Same additive/non-gating posture as hello-ironclaw above — NOT a required check,
    # so a GAP row (a tracked demo-path relaxation) never blocks a release, but a real
    # CORE containment regression exits non-zero and turns this job red.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Try to break the sandbox and prove it holds
        run: examples/red-team-escape/run.sh

  run-mock-examples:
    # Credential-free SMOKE MATRIX over every examples/*/run-mock.sh recipe. Each mock
    # recipe drives the offline mock-agent through the published HTTP chat route and
    # ASSERTS a NON-EMPTY assistant reply — the exact regression IRO-279 slipped past,
    # where the scripts polled `.text` (the /chat/send REQUEST field) instead of
    # `.content` (the reply field) and, because /messages is drain-on-read, silently
    # drained the reply to empty while still exiting 0. The recipes now fail-closed on
    # an empty reply, so a wrong-field or broken round-trip turns this job red.
    #
    # The sandbox image + demo control-plane are built ONCE and shared across the whole
    # matrix (build.sh + a single `compose up`), so one cold start covers every recipe
    # and the per-recipe runtime stays tight — no rebuild per example. Same additive/
    # non-gating posture as the jobs above: NOT a required check, so it surfaces a broken
    # first-five-minutes without ever blocking a release.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build the sandbox image once (ironclaw-sandbox:latest)
        run: bash container/build.sh
      - name: Bring the offline demo control-plane up once
        run: docker compose -f docker-compose.demo.yml up --build -d
      - name: Wait for the control-plane to be healthy
        run: |
          for _ in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8787/healthz >/dev/null 2>&1; then
              echo "control-plane healthy"; exit 0
            fi
            sleep 1
          done
          echo "FAIL: control-plane never became healthy within 90s" >&2
          docker compose -f docker-compose.demo.yml logs --no-color 2>&1 | tail -60 >&2
          exit 1
      - name: Run every run-mock.sh and assert a non-empty reply
        # Fail-closed: iterate all recipes, keep going so every failure is reported, then
        # exit non-zero if ANY recipe failed. Each script self-asserts a non-empty reply
        # (drain-on-read means the assertion MUST live inside the script's own poll loop —
        # a re-read from CI here would see []), so a bare non-zero exit is a real break.
        run: |
          set -uo pipefail
          fail=0
          shopt -s nullglob
          scripts=(examples/*/run-mock.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "FAIL: no examples/*/run-mock.sh found — did the recipes move?" >&2
            exit 1
          fi
          for s in "${scripts[@]}"; do
            echo "::group::$s"
            if bash "$s"; then
              echo "PASS: $s"
            else
              echo "FAIL: $s (non-empty reply assertion failed)"; fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"
      - name: Dump control-plane logs on failure
        if: failure()
        run: docker compose -f docker-compose.demo.yml logs --no-color 2>&1 | tail -120
      - name: Tear the demo down
        if: always()
        run: docker compose -f docker-compose.demo.yml down >/dev/null 2>&1 || true

  smoke-matrix:
    # RELEASE-READINESS smoke matrix (IRO-295): the single runner that exercises
    # EVERY examples/*/ directory end-to-end against one offline control-plane and
    # asserts real output. It extends the run-mock matrix above to also cover the
    # config-recipe examples (setup.sh: channel-triage, keyword-watcher,
    # multi-agent-team, personal-assistant) that the chat-only recipes cannot reach
    # — those call `ironctl registry ...` against the live control-plane and are
    # asserted to mint a real messaging-group id, so a broken CLI or registry route
    # turns this job red. It rebuilds the demo image from the checkout first, which
    # is what guards the IRO-278 class regression (a stale pre-fix image 500s with
    # "UNIQUE constraint failed: messages_in.seq" under slack-triage's rapid sends).
    #
    # This is the `make smoke` target run in CI. Same additive/non-gating posture as
    # the jobs above: NOT a required check, so it surfaces a broken first-run without
    # ever blocking a release.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go (needed to build ironctl for the config recipes)
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Run the full example smoke matrix
        run: examples/smoke-matrix.sh
