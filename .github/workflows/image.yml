name: Image

# Build and publish the control-plane container image to GHCR on release.
#
# It chains off the "Release" workflow via workflow_run: the Release workflow cuts a
# GitHub Release (and tag) on every push to main, and this runs right after it
# succeeds, building the exact commit that was released. (A release created by the
# workflow's GITHUB_TOKEN does NOT fire a `release:` event — GitHub's recursion guard
# — so workflow_run is the reliable chain.) workflow_dispatch allows a manual rebuild.
#
# The image bundles ironclaw-controlplane + ironctl (container/controlplane.Dockerfile);
# docker-compose.yml and the README pull it from ghcr.io/<owner>/ironclaw-controlplane.
#
# Multi-arch (linux/amd64 + linux/arm64): the image embeds a CGO (SQLCipher) binary, so
# each arch is built NATIVELY on its own GitHub-hosted runner (ubuntu-latest for amd64,
# ubuntu-24.04-arm for arm64) rather than under QEMU emulation, which is slow and flaky
# for CGO. Each arch is pushed to GHCR by digest (no tag), then a final `merge` job
# stitches the per-arch digests into one manifest list under the real tags and attaches
# build provenance to the index digest.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to stamp + publish (e.g. v0.1.99). Blank = latest only."
        required: false
        default: ""

# Least privilege by default: the workflow token is read-only at the top level.
# The write scopes (packages / id-token / attestations) are granted only to the
# specific jobs that push to GHCR and sign/attest the image — see each job below.
permissions:
  contents: read

# Serialize image publishes so two builds never race the :latest tag.
concurrency:
  group: image
  cancel-in-progress: false

jobs:
  # Resolve the lowercased GHCR ref + the version to tag with, once, so the per-arch
  # build matrix and the merge job all agree. The version is the git tag the Release
  # workflow put on THIS commit (so the image tag always matches the built commit's
  # release — no formula duplication, no latest-release race); a manual dispatch may
  # override it. Blank version → publish :latest only. A commit with no
  # container/controlplane.Dockerfile (older release chaining in, or a revert) yields
  # present=false and the build/merge jobs skip cleanly — "nothing to publish", not a
  # failure.
  prepare:
    runs-on: ubuntu-latest
    # On the workflow_run path, only build when the Release actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read # read-only API lookups + trust-gate; no push/sign here
    outputs:
      present: ${{ steps.meta.outputs.present }}
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
      tag_args: ${{ steps.meta.outputs.tag_args }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      # SECURITY (Dangerous-Workflow / "pwn request"): this workflow runs in a
      # privileged context (the build/merge jobs hold packages + attestations write),
      # so it must NEVER `actions/checkout` the event-supplied head_sha — that is the
      # attacker-controllable ref a forked PR could smuggle in. Instead we resolve all
      # metadata over the read-only API and TRUST-GATE the commit here; the build job
      # checks out the SHA this job emits (`needs.prepare.outputs.sha`), never the raw
      # event variable. The gate proves the commit actually lives on the protected
      # default branch (Release only runs on push-to-main), so a privileged build can
      # only ever run on trusted, branch-protected code.
      - name: Resolve + trust-gate the commit, image ref, and version
        id: meta
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          DISPATCH_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          default_branch="${DEFAULT_BRANCH:-main}"

          # 1) Resolve the commit to build and trust-gate it. A manual dispatch runs on a
          #    ref only a repo-writer could have selected, so its commit (github.sha) is
          #    trusted as-is. On the workflow_run path the SHA comes from the event and is
          #    treated as untrusted until proven to live on the protected branch: it must
          #    have been pushed to ${default_branch} AND be reachable from that branch's
          #    tip. Anything else (e.g. a fork PR head) is refused — fail loud, fail closed.
          if [ "${EVENT}" = "workflow_dispatch" ]; then
            sha="${DISPATCH_SHA}"
          else
            sha="${RUN_SHA}"
            if [ "${RUN_BRANCH}" != "${default_branch}" ]; then
              echo "::error::Release ran on '${RUN_BRANCH}', not the protected '${default_branch}' branch — refusing to build a privileged image from an untrusted ref." >&2
              exit 1
            fi
            status="$(gh api "repos/${REPO}/compare/${default_branch}...${sha}" --jq '.status')"
            case "${status}" in
              identical|behind) : ;; # sha is the branch tip or an ancestor of it → on-branch, trusted
              *)
                echo "::error::Commit ${sha} is not reachable from '${default_branch}' (compare status: ${status}) — refusing to build a privileged image from an untrusted ref." >&2
                exit 1
                ;;
            esac
          fi
          echo "Trusted build commit: ${sha} (on ${default_branch})"

          owner="$(printf '%s' "${OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ironclaw-controlplane"

          # 2) Dockerfile presence at that commit — via the contents API, no checkout. A
          #    commit without it (older release chaining in, or a revert) → present=false
          #    and the build/merge jobs skip cleanly: "nothing to publish", not a failure.
          if ! gh api "repos/${REPO}/contents/container/controlplane.Dockerfile?ref=${sha}" --silent >/dev/null 2>&1; then
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "No container/controlplane.Dockerfile at ${sha} — skipping image build."
            exit 0
          fi

          # 3) Version: an explicit dispatch input wins; otherwise the release tag this
          #    commit carries, read from the tags API (not a local checkout).
          if [ "${EVENT}" = "workflow_dispatch" ] && [ -n "${INPUT_TAG}" ]; then
            version="${INPUT_TAG}"
          else
            version="$(gh api "repos/${REPO}/tags" --paginate \
              --jq ".[] | select(.commit.sha == \"${sha}\") | .name" \
              | grep -E '^v[0-9]' | head -1 || true)"
          fi

          # `docker buildx imagetools create` takes the tags as -t flags. Always tag
          # :latest; add the immutable :<version> tag when this commit carries one.
          tag_args="-t ${image}:latest"
          if [ -n "${version}" ]; then
            tag_args="${tag_args} -t ${image}:${version}"
          fi
          {
            echo "present=true"
            echo "image=${image}"
            echo "version=${version:-dev}"
            echo "tag_args=${tag_args}"
            echo "sha=${sha}"
          } >> "${GITHUB_OUTPUT}"
          echo "Publishing ${tag_args} (VERSION=${version:-dev}) from ${sha}"

  # Build each arch natively on its own runner and push to GHCR BY DIGEST (no tag).
  # The merge job below assembles these digests into the tagged manifest list.
  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.present == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read # checkout the trust-gated commit
      packages: write # push the per-arch image to GHCR by digest
    steps:
      - name: Sanitize platform pair
        id: plat
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "pair=${PLATFORM//\//-}" >> "${GITHUB_OUTPUT}"

      # Check out the commit the prepare job already trust-gated to the protected
      # branch — never the raw event-supplied head_sha. (Dangerous-Workflow: no
      # untrusted checkout in a privileged workflow_run context.)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: container/controlplane.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          # Push by digest only; the merge job applies the real tags. name-canonical
          # keeps the pushed ref pinned to the digest under the target repo.
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch inline attestations off — provenance is attached once to the merged
          # index below (GitHub artifact attestation), matching the release binaries.
          provenance: false
          sbom: false

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ steps.plat.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into one manifest list under the real tags, then attach
  # build provenance to the resulting index digest (verify with `gh attestation verify
  # oci://ghcr.io/<owner>/ironclaw-controlplane:<tag>`).
  merge:
    needs: [prepare, build]
    if: ${{ needs.prepare.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # read-only; this job does not check out source
      packages: write # push the merged manifest list to GHCR
      id-token: write # keyless provenance + SBOM signing (Sigstore OIDC)
      attestations: write # actions/attest-build-provenance + attest-sbom on the index
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        id: manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          TAG_ARGS: ${{ needs.prepare.outputs.tag_args }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools create ${TAG_ARGS} \
            $(printf "${IMAGE}@sha256:%s " *)
          # The index digest is the verifiable subject for the published tag.
          digest="$(docker buildx imagetools inspect "${IMAGE}:latest" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Published ${IMAGE} index ${digest}"
          docker buildx imagetools inspect "${IMAGE}:latest"

      - name: Attest the control-plane image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      # Per-container-image SBOM (IRO-32 A2). Scan the exact published index by digest
      # with syft → CycloneDX, then attach it as a signed SBOM attestation to the same
      # index digest. Consumers verify it anonymously alongside provenance:
      #   gh attestation verify oci://<image>@<digest> --repo <repo> \
      #     --predicate-type https://cyclonedx.org/bom
      # Pin syft via the SHA-pinned download-syft sub-action instead of
      # `curl …/syft/main/install.sh | sh` (mutable branch piped to a shell).
      # The sub-action installs a fixed syft onto PATH; the scan command is unchanged.
      - name: Install syft (pinned)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Generate image SBOM (syft → CycloneDX)
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          set -euo pipefail
          syft version
          # Scan the multi-arch index by its immutable digest (logged into GHCR above).
          syft scan "registry:${IMAGE}@${DIGEST}" \
            -o "cyclonedx-json=${RUNNER_TEMP}/image.cdx.json"

      - name: Attest the image SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          sbom-path: ${{ runner.temp }}/image.cdx.json
          push-to-registry: true

  # Consumer-side guard. The jobs above PRODUCE the image + attestation; this proves they
  # are CONSUMABLE the way a real user consumes them — anonymously, with no registry
  # credentials. If the GHCR package is (or silently reverts to) private, or its tag no
  # longer resolves to the attested index, or the attestation can't be verified from the
  # outside, this FAILS the release instead of shipping a green-but-unpullable set.
  # (fail-loud, fail-closed + verify-before-trust.)
  #
  # Deliberately runs NO docker/login-action and holds only `contents: read` — it must
  # succeed on exactly the unauthenticated path users hit, never on cached runner creds.
  verify-consumer:
    needs: [prepare, merge]
    if: ${{ needs.prepare.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # gh attestation verify reads the public attestation; no push/sign here
    env:
      IMAGE: ${{ needs.prepare.outputs.image }}
      VERSION: ${{ needs.prepare.outputs.version }}
      EXPECTED_DIGEST: ${{ needs.merge.outputs.digest }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Anonymous manifest pull (no registry auth)
        run: |
          set -euo pipefail
          # IMAGE is already lowercased by prepare; strip the registry host to get the
          # GHCR repository path used by the registry v2 API.
          repo="${IMAGE#ghcr.io/}"

          # Always check :latest; add the immutable :<version> when this commit carried a
          # release tag (VERSION is "dev" when it didn't).
          tags="latest"
          if [ -n "${VERSION}" ] && [ "${VERSION}" != "dev" ]; then
            tags="latest ${VERSION}"
          fi

          # GHCR anonymous pull flow: request a bearer token with NO credentials. For a
          # PUBLIC package this token carries pull scope; for a PRIVATE one it does not and
          # the manifest fetch below returns 401/403 — exactly the regression we guard.
          token="$(curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" | jq -r '.token')"
          if [ -z "${token}" ] || [ "${token}" = "null" ]; then
            echo "::error::Could not obtain an anonymous GHCR pull token for ${repo}." >&2
            exit 1
          fi

          accept='application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json'
          for tag in ${tags}; do
            echo "Anonymous manifest pull: ghcr.io/${repo}:${tag}"
            # GHCR is eventually consistent right after a push; retry a few times before
            # failing so a propagation lag is not mistaken for a private package.
            code=""
            hdr="$(mktemp)"
            for attempt in 1 2 3 4 5; do
              code="$(curl -s -D "${hdr}" -o /dev/null -w '%{http_code}' \
                -H "Authorization: Bearer ${token}" \
                -H "Accept: ${accept}" \
                "https://ghcr.io/v2/${repo}/manifests/${tag}")"
              [ "${code}" = "200" ] && break
              echo "  attempt ${attempt}: HTTP ${code}, retrying in 10s..."
              sleep 10
            done
            if [ "${code}" != "200" ]; then
              echo "::error::Anonymous pull of ghcr.io/${repo}:${tag} returned HTTP ${code} (expected 200) — the package is not anonymously pullable (likely private). Failing the release." >&2
              exit 1
            fi
            echo "  -> HTTP 200 (anonymously pullable)"
            # The tag a public consumer resolves must be exactly the index we attested.
            pulled="$(grep -i '^docker-content-digest:' "${hdr}" | tr -d '\r' | awk '{print $2}')"
            if [ -n "${EXPECTED_DIGEST}" ] && [ -n "${pulled}" ] && [ "${pulled}" != "${EXPECTED_DIGEST}" ]; then
              echo "::error::ghcr.io/${repo}:${tag} resolves to ${pulled} but the just-published index digest is ${EXPECTED_DIGEST} — mismatch. Failing the release." >&2
              exit 1
            fi
          done

      - name: Verify build provenance from the consumer side
        run: |
          set -euo pipefail
          # Verify by digest (the attested subject) and by the tags users actually pull.
          # No registry login above means this exercises the genuine anonymous OCI path.
          refs="oci://${IMAGE}@${EXPECTED_DIGEST}"
          if [ -z "${EXPECTED_DIGEST}" ]; then
            refs="oci://${IMAGE}:latest"
          fi
          if [ -n "${VERSION}" ] && [ "${VERSION}" != "dev" ]; then
            refs="${refs} oci://${IMAGE}:${VERSION}"
          fi
          for ref in ${refs}; do
            echo "gh attestation verify ${ref} --repo ${REPO}"
            # gh queries the public attestations API right after publish; brief retry to
            # absorb indexing lag, then fail loud if it still cannot verify.
            ok=""
            for attempt in 1 2 3 4 5; do
              if gh attestation verify "${ref}" --repo "${REPO}"; then
                ok="yes"; break
              fi
              echo "  attempt ${attempt}: not yet verifiable, retrying in 10s..."
              sleep 10
            done
            if [ -z "${ok}" ]; then
              echo "::error::Attestation for ${ref} did not verify from the consumer side. Failing the release." >&2
              exit 1
            fi
          done
