name: Image

# Build and publish the control-plane container image to GHCR on release.
#
# It chains off the "Release" workflow via workflow_run: the Release workflow cuts a
# GitHub Release (and tag) on every push to main, and this runs right after it
# succeeds, building the exact commit that was released. (A release created by the
# workflow's GITHUB_TOKEN does NOT fire a `release:` event — GitHub's recursion guard
# — so workflow_run is the reliable chain.) workflow_dispatch allows a manual rebuild.
#
# The image bundles ironclaw-controlplane + ironctl (container/controlplane.Dockerfile);
# docker-compose.yml and the README pull it from ghcr.io/<owner>/ironclaw-controlplane.
#
# Multi-arch (linux/amd64 + linux/arm64): the image embeds a CGO (SQLCipher) binary, so
# each arch is built NATIVELY on its own GitHub-hosted runner (ubuntu-latest for amd64,
# ubuntu-24.04-arm for arm64) rather than under QEMU emulation, which is slow and flaky
# for CGO. Each arch is pushed to GHCR by digest (no tag), then a final `merge` job
# stitches the per-arch digests into one manifest list under the real tags and attaches
# build provenance to the index digest.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to stamp + publish (e.g. v0.1.99). Blank = latest only."
        required: false
        default: ""

permissions:
  contents: read
  packages: write # push to GHCR under the repository owner
  id-token: write # keyless provenance signing (Sigstore OIDC)
  attestations: write # actions/attest-build-provenance for the image

# Serialize image publishes so two builds never race the :latest tag.
concurrency:
  group: image
  cancel-in-progress: false

jobs:
  # Resolve the lowercased GHCR ref + the version to tag with, once, so the per-arch
  # build matrix and the merge job all agree. The version is the git tag the Release
  # workflow put on THIS commit (so the image tag always matches the built commit's
  # release — no formula duplication, no latest-release race); a manual dispatch may
  # override it. Blank version → publish :latest only. A commit with no
  # container/controlplane.Dockerfile (older release chaining in, or a revert) yields
  # present=false and the build/merge jobs skip cleanly — "nothing to publish", not a
  # failure.
  prepare:
    runs-on: ubuntu-latest
    # On the workflow_run path, only build when the Release actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      present: ${{ steps.meta.outputs.present }}
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
      tag_args: ${{ steps.meta.outputs.tag_args }}
    steps:
      # Build the exact commit the release was cut from (workflow_run), else the ref
      # the dispatch was started on. Full history + tags so we can read the release
      # tag this commit carries.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve image ref + version
        id: meta
        env:
          OWNER: ${{ github.repository_owner }}
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          owner="$(printf '%s' "${OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ironclaw-controlplane"
          if [ ! -f container/controlplane.Dockerfile ]; then
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "No container/controlplane.Dockerfile at $(git rev-parse --short HEAD) — skipping image build."
            exit 0
          fi
          if [ "${EVENT}" = "workflow_dispatch" ] && [ -n "${INPUT_TAG}" ]; then
            version="${INPUT_TAG}"
          else
            version="$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -1 || true)"
          fi
          # `docker buildx imagetools create` takes the tags as -t flags. Always tag
          # :latest; add the immutable :<version> tag when this commit carries one.
          tag_args="-t ${image}:latest"
          if [ -n "${version}" ]; then
            tag_args="${tag_args} -t ${image}:${version}"
          fi
          {
            echo "present=true"
            echo "image=${image}"
            echo "version=${version:-dev}"
            echo "tag_args=${tag_args}"
          } >> "${GITHUB_OUTPUT}"
          echo "Publishing ${tag_args} (VERSION=${version:-dev})"

  # Build each arch natively on its own runner and push to GHCR BY DIGEST (no tag).
  # The merge job below assembles these digests into the tagged manifest list.
  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.present == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Sanitize platform pair
        id: plat
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "pair=${PLATFORM//\//-}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: container/controlplane.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          # Push by digest only; the merge job applies the real tags. name-canonical
          # keeps the pushed ref pinned to the digest under the target repo.
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch inline attestations off — provenance is attached once to the merged
          # index below (GitHub artifact attestation), matching the release binaries.
          provenance: false
          sbom: false

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.plat.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into one manifest list under the real tags, then attach
  # build provenance to the resulting index digest (verify with `gh attestation verify
  # oci://ghcr.io/<owner>/ironclaw-controlplane:<tag>`).
  merge:
    needs: [prepare, build]
    if: ${{ needs.prepare.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        id: manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          TAG_ARGS: ${{ needs.prepare.outputs.tag_args }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools create ${TAG_ARGS} \
            $(printf "${IMAGE}@sha256:%s " *)
          # The index digest is the verifiable subject for the published tag.
          digest="$(docker buildx imagetools inspect "${IMAGE}:latest" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Published ${IMAGE} index ${digest}"
          docker buildx imagetools inspect "${IMAGE}:latest"

      - name: Attest the control-plane image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  # Consumer-side guard. The jobs above PRODUCE the image + attestation; this proves they
  # are CONSUMABLE the way a real user consumes them — anonymously, with no registry
  # credentials. If the GHCR package is (or silently reverts to) private, or its tag no
  # longer resolves to the attested index, or the attestation can't be verified from the
  # outside, this FAILS the release instead of shipping a green-but-unpullable set.
  # (fail-loud, fail-closed + verify-before-trust.)
  #
  # Deliberately runs NO docker/login-action and holds only `contents: read` — it must
  # succeed on exactly the unauthenticated path users hit, never on cached runner creds.
  verify-consumer:
    needs: [prepare, merge]
    if: ${{ needs.prepare.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # gh attestation verify reads the public attestation; no push/sign here
    env:
      IMAGE: ${{ needs.prepare.outputs.image }}
      VERSION: ${{ needs.prepare.outputs.version }}
      EXPECTED_DIGEST: ${{ needs.merge.outputs.digest }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Anonymous manifest pull (no registry auth)
        run: |
          set -euo pipefail
          # IMAGE is already lowercased by prepare; strip the registry host to get the
          # GHCR repository path used by the registry v2 API.
          repo="${IMAGE#ghcr.io/}"

          # Always check :latest; add the immutable :<version> when this commit carried a
          # release tag (VERSION is "dev" when it didn't).
          tags="latest"
          if [ -n "${VERSION}" ] && [ "${VERSION}" != "dev" ]; then
            tags="latest ${VERSION}"
          fi

          # GHCR anonymous pull flow: request a bearer token with NO credentials. For a
          # PUBLIC package this token carries pull scope; for a PRIVATE one it does not and
          # the manifest fetch below returns 401/403 — exactly the regression we guard.
          token="$(curl -fsSL "https://ghcr.io/token?scope=repository:${repo}:pull" | jq -r '.token')"
          if [ -z "${token}" ] || [ "${token}" = "null" ]; then
            echo "::error::Could not obtain an anonymous GHCR pull token for ${repo}." >&2
            exit 1
          fi

          accept='application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json'
          for tag in ${tags}; do
            echo "Anonymous manifest pull: ghcr.io/${repo}:${tag}"
            # GHCR is eventually consistent right after a push; retry a few times before
            # failing so a propagation lag is not mistaken for a private package.
            code=""
            hdr="$(mktemp)"
            for attempt in 1 2 3 4 5; do
              code="$(curl -s -D "${hdr}" -o /dev/null -w '%{http_code}' \
                -H "Authorization: Bearer ${token}" \
                -H "Accept: ${accept}" \
                "https://ghcr.io/v2/${repo}/manifests/${tag}")"
              [ "${code}" = "200" ] && break
              echo "  attempt ${attempt}: HTTP ${code}, retrying in 10s..."
              sleep 10
            done
            if [ "${code}" != "200" ]; then
              echo "::error::Anonymous pull of ghcr.io/${repo}:${tag} returned HTTP ${code} (expected 200) — the package is not anonymously pullable (likely private). Failing the release." >&2
              exit 1
            fi
            echo "  -> HTTP 200 (anonymously pullable)"
            # The tag a public consumer resolves must be exactly the index we attested.
            pulled="$(grep -i '^docker-content-digest:' "${hdr}" | tr -d '\r' | awk '{print $2}')"
            if [ -n "${EXPECTED_DIGEST}" ] && [ -n "${pulled}" ] && [ "${pulled}" != "${EXPECTED_DIGEST}" ]; then
              echo "::error::ghcr.io/${repo}:${tag} resolves to ${pulled} but the just-published index digest is ${EXPECTED_DIGEST} — mismatch. Failing the release." >&2
              exit 1
            fi
          done

      - name: Verify build provenance from the consumer side
        run: |
          set -euo pipefail
          # Verify by digest (the attested subject) and by the tags users actually pull.
          # No registry login above means this exercises the genuine anonymous OCI path.
          refs="oci://${IMAGE}@${EXPECTED_DIGEST}"
          if [ -z "${EXPECTED_DIGEST}" ]; then
            refs="oci://${IMAGE}:latest"
          fi
          if [ -n "${VERSION}" ] && [ "${VERSION}" != "dev" ]; then
            refs="${refs} oci://${IMAGE}:${VERSION}"
          fi
          for ref in ${refs}; do
            echo "gh attestation verify ${ref} --repo ${REPO}"
            # gh queries the public attestations API right after publish; brief retry to
            # absorb indexing lag, then fail loud if it still cannot verify.
            ok=""
            for attempt in 1 2 3 4 5; do
              if gh attestation verify "${ref}" --repo "${REPO}"; then
                ok="yes"; break
              fi
              echo "  attempt ${attempt}: not yet verifiable, retrying in 10s..."
              sleep 10
            done
            if [ -z "${ok}" ]; then
              echo "::error::Attestation for ${ref} did not verify from the consumer side. Failing the release." >&2
              exit 1
            fi
          done
